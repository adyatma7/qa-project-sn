name: QA Automation CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
        working-directory: playwright-tests
      - run: playwright install --with-deps
        working-directory: playwright-tests
      - run: pytest
        working-directory: playwright-tests
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: playwright-tests/reports/
      - name: Package report for Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-tests/reports

  # Publishes the HTML report so it's viewable by a link, not just a
  # downloadable CI artifact. Runs even if tests failed (if: always()) —
  # a failure report is exactly what a reader most wants to see. Only
  # deploys from main, never from pull requests.
  deploy-report:
    if: always() && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
