name: QA Automation CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
        working-directory: playwright-tests
      - run: playwright install --with-deps
        working-directory: playwright-tests
      - run: pytest
        working-directory: playwright-tests
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-tests/reports/

  # Separate job on purpose — shows up as its own check in the GitHub UI,
  # so both tools' results are independently visible. ubuntu-latest ships
  # with Chrome pre-installed, so no extra browser setup step is needed
  # the way Playwright needs `playwright install`.
  selenium-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
        working-directory: selenium-tests
      - run: pytest -v
        working-directory: selenium-tests
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-report
          path: selenium-tests/reports/

  # Combines both suites' reports into one GitHub Pages site — each on
  # its own page (not merged into a single report, since they're
  # deliberately separate tools/frameworks), with a small index linking
  # to both. Runs even if either test job failed (if: always()), because
  # a failure's report is exactly what a reader most wants to see.
  deploy-report:
    if: always() && github.ref == 'refs/heads/main'
    needs: [playwright-tests, selenium-tests]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: pages-site/playwright
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: selenium-report
          path: pages-site/selenium
        continue-on-error: true
      - name: Build index page
        run: |
          cat > pages-site/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>QA Automation Portfolio — Reports</title></head>
          <body style="font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px;">
            <h1>QA Automation Portfolio — Reports</h1>
            <p>Updated automatically after every push to <code>main</code>, pass or fail.</p>
            <ul>
              <li><a href="playwright/report.html">Playwright report</a> (primary suite: UI + API)</li>
              <li><a href="selenium/report.html">Selenium report</a> (secondary suite: 6 cross-validated cases)</li>
            </ul>
          </body>
          </html>
          HTML
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
